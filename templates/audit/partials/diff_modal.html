<div id="modal-backdrop"
    class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-300"
    onclick="if(event.target === this) this.remove()">

    <div
        class="bg-slate-900 border border-slate-800 rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden animate-in zoom-in slide-in-from-bottom-4 duration-300">
        <!-- Header -->
        <div class="px-8 py-6 border-b border-slate-800 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-white font-outfit">Audit Entry Details</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Entry ID #{{ entry.id }}</p>
            </div>
            <button onclick="document.getElementById('modal-backdrop').remove()"
                class="text-slate-500 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Content -->
        <div class="p-8 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Action</span>
                    <p class="text-sm text-slate-200 font-bold">{{ entry.action }}</p>
                </div>
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Timestamp</span>
                    <p class="text-sm text-slate-200 font-bold">{{ entry.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] text-slate-500 font-bold uppercase">Data Snapshot</label>
                <div class="bg-slate-950 border border-slate-800 rounded-xl overflow-hidden">
                    <pre
                        class="p-4 text-xs font-mono text-blue-300 overflow-auto max-h-80 custom-scrollbar">{{ entry.diff | tojson(indent=2) }}</pre>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-8 py-4 bg-slate-950/50 border-t border-slate-800 flex justify-end">
            <button onclick="document.getElementById('modal-backdrop').remove()"
                class="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-sm font-bold transition-all">
                Close
            </button>
        </div>
    </div>
</div>
