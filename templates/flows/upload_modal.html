<div id="modal-backdrop"
    class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-300"
    onclick="if(event.target === this) this.remove()">

    <div
        class="bg-slate-900 border border-slate-800 rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden animate-in zoom-in slide-in-from-bottom-4 duration-300">
        <!-- Header -->
        <div class="px-8 py-6 border-b border-slate-800 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-white font-outfit">Upload Decision Flow</h2>
                <p class="text-xs text-slate-500">Paste your clinical rule JSON below.</p>
            </div>
            <button onclick="document.getElementById('modal-backdrop').remove()"
                class="text-slate-500 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Form -->
        <form hx-post="/api/v1/admin/flows" hx-target="#upload-error-container" hx-swap="innerHTML"
            class="p-8 space-y-6">

            <div id="upload-error-container"></div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-300">Flow Name</label>
                <input type="text" name="name" required
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    placeholder="e.g., General Winter Symptoms">
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-300">Rule Logic (JSON)</label>
                <textarea name="rule_payload_json" required
                    class="w-full h-64 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs font-mono text-blue-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all custom-scrollbar"
                    placeholder='{ "nodes": [...], "edges": [...] }'></textarea>
            </div>

            <div class="flex items-center justify-end gap-3 pt-4">
                <button type="button" onclick="document.getElementById('modal-backdrop').remove()"
                    class="px-6 py-3 text-sm font-bold text-slate-400 hover:text-white transition-colors">
                    Cancel
                </button>
                <button type="submit"
                    class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95 flex items-center gap-2">
                    <span
                        class="htmx-indicator animate-spin rounded-full h-4 w-4 border-2 border-white/20 border-t-white"></span>
                    Create Draft Flow
                </button>
            </div>
        </form>
    </div>
</div>
