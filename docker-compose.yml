services:
  app:
    build: .
    ports: ["8000:8000"]
    volumes: [".:/app"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      REDIS_URL: redis://redis:6379   # local Redis in dev; .env REDIS_URL is overridden here intentionally
    depends_on: [db, redis]
    env_file: .env

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus
      POSTGRES_DB: campustriage
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  postgres_data:
